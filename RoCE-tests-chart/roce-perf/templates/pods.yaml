{{- $root := . -}}
{{- $s := .Values.scenario -}}
{{- $script := printf "%s/%s" .Values.script.mountPath .Values.script.fileName -}}
{{- $device := .Values.topology.device -}}
{{/*
  Three pods make up a 1-to-1 run. The leaf vs spine difference is just which nic
  each client sits on (see values.scenario). The device-plugin resource is derived
  from the nic; the NAD is each endpoint's explicit .nad, or topology.nadPattern.
*/}}
{{- $pods := list
    (dict "name" "rdma-server"       "role" "server" "node" $s.server.node   "nic" $s.server.nic   "nad" $s.server.nad   "label" ""               "autostart" true)
    (dict "name" "rdma-client-leaf"  "role" "client" "node" $s.sameLeaf.node "nic" $s.sameLeaf.nic "nad" $s.sameLeaf.nad "label" "same-leaf"      "autostart" false)
    (dict "name" "rdma-client-spine" "role" "client" "node" $s.spine.node    "nic" $s.spine.nic    "nad" $s.spine.nad    "label" "spine-crossing" "autostart" false)
-}}
{{- range $pods }}
{{- $nad := .nad | default ($root.Values.topology.nadPattern | replace "{node}" .node | replace "{nic}" .nic) -}}
{{- $res := $root.Values.topology.resourcePattern | replace "{nic}" .nic -}}
{{- $cmd := list "sleep" "infinity" -}}
{{- if .autostart -}}
  {{- $cmd = list "bash" $script "server" $device -}}
{{- end }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ .name }}
  labels:
    {{- include "roce-perf.labels" $root | nindent 4 }}
    roce-perf/role: {{ .role }}
    {{- with .label }}
    roce-perf/path: {{ . }}
    {{- end }}
  annotations:
    k8s.v1.cni.cncf.io/networks: {{ $nad | quote }}
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: {{ .node }}
  containers:
    {{- include "roce-perf.container" (dict "ctx" $root "resource" $res "command" (toJson $cmd)) | nindent 4 }}
  volumes:
    {{- include "roce-perf.volumes" $root | nindent 4 }}
{{- end }}
