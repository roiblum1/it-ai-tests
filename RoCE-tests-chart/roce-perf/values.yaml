# =============================================================================
# roce-perf values
# =============================================================================
# Full benchmark image: perftest (plain + CUDA/GPUDirect), nccl-tests + OpenMPI,
# python plotting stack. Build from ../Dockerfile.
image: docker.io/roi12345/it-ai-rdma-perf:v1
imagePullPolicy: IfNotPresent

# Pods run privileged so in-pod diagnostics (ping/traceroute, which need raw/ICMP
# sockets) work under any OpenShift SCC, alongside RDMA. IPC_LOCK is kept for the
# memory registration the RDMA stack needs (and for a non-privileged fallback).
privileged: true
ipcLock: true

# -----------------------------------------------------------------------------
# Port2Port RoCE topology.
#
# Each node exposes 8 RoCE rails (one NIC per GPU); each rail is its own SR-IOV
# device-plugin resource and its own Multus NAD (carrying that rail's exclusive
# IP + next hop). The first 4 rails land on leaf 1, the next 4 on leaf 2.
#
# A pod is therefore pinned by a (node, nic) pair, from which we DERIVE:
#   NAD name           = nadPattern      with {node}/{nic} substituted
#   device-plugin rsrc = resourcePattern with {nic}        substituted
# -----------------------------------------------------------------------------
topology:
  nadPattern: "{node}-{nic}"                            # e.g. worker-1-ens192
  resourcePattern: "openshift.io/rdma_resource_{nic}"   # e.g. openshift.io/rdma_resource_ens192
  device: mlx5_0                                        # in-pod RDMA device (one VF per pod); "auto" detects it

# Common fabric parameter shared by all perftest invocations.
mtu: 4096

script:
  fileName: roce_bench.sh           # main runner, must exist under files/
  mountPath: /opt/roce

# Shared results location. The report Job reads EVERY pod's run dirs from here,
# so for graphs this should be an RWX PVC. Without it each pod keeps results in
# its own emptyDir (usable for a single-pod manual run, not for the report).
results:
  pvcName: ""
  mountPath: /results

# -----------------------------------------------------------------------------
# Phase-1 benchmark matrix. Each test is rendered into the pod environment and
# consumed by roce_bench.sh. Toggle tests with .enabled.
#   BW  tests run for a duration (-D) over a list of message sizes (-s).
#   LAT tests run a fixed iteration count (-n) and dump raw unsorted samples
#       (-U) so the report Job can build CDF/histogram and percentiles.
# -----------------------------------------------------------------------------
benchmarks:
  bw:
    read:                           # 1.1 Read-only BW  (ib_read_bw)
      enabled: true
      duration: 10                  # seconds (-D)
      sizes: [65536, 1048576]       # bytes (-s), one run per size
      qps: 8                        # number of QPs (-q)
    write:                          # 1.2 Write-only BW (ib_write_bw)
      enabled: true
      duration: 10
      sizes: [65536, 1048576]
      qps: 8
  lat:
    write:                          # 1.3 Write-only Lat (ib_write_lat) + histogram
      enabled: true
      iters: 100000                 # -n
      size: 2                       # bytes (-s)
      unsorted: true                # -U raw samples for graphing
    read:                           # 1.4 Read-only Lat (ib_read_lat) + histogram
      enabled: true
      iters: 100000
      size: 2
      unsorted: true
    send:                           # 1.5 Send Lat (ib_send_lat) + histogram
      enabled: true
      iters: 100000
      size: 2
      unsorted: true

# 1.6 GPUDirect: re-run the perftest matrix above with --use_cuda=<gpuIndex>.
# Requires the CUDA image and a GPU on the node (adds nvidia.com/gpu request).
gpudirect:
  enabled: false
  gpuIndex: 0

# 1.7 NCCL one-HCA-vs-all. Heaviest path; run manually via mpirun between the
# two 1-to-1 pods (see NOTES.txt). Default off.
nccl:
  enabled: false
  collective: all_reduce_perf
  sizes:
    begin: "8"                      # -b
    end: "128M"                     # -e
    factor: "2"                     # -f
  gpusPerProc: 1                    # -g
  hcaOne: mlx5_0                    # NCCL_IB_HCA for the "one port" run
  hcaAll: "mlx5_0,mlx5_1,mlx5_2,mlx5_3,mlx5_4,mlx5_5,mlx5_6,mlx5_7"  # "many"

# In-cluster plotting/report Job: reads results PVC, emits PNGs + report.html
# under <results.mountPath>/report. Requires results.pvcName (RWX).
report:
  enabled: false
  outputSubdir: report

# -----------------------------------------------------------------------------
# 1-to-1 scenario. One server + two clients gives both environments at once.
# Leaf vs spine is purely WHICH NIC each endpoint uses:
#   same-leaf      (2.1): client on the SAME rail/leaf as the server (no spine)
#   spine-crossing (2.2): client on a rail that lands on a DIFFERENT leaf
# The chart stamps three pods (rdma-server, rdma-client-leaf, rdma-client-spine);
# the server autostarts its listeners, the clients idle until run_suite.sh drives
# them. Each (node, nic) below is turned into a NAD + resource via topology above.
# -----------------------------------------------------------------------------
scenario:
  server:
    node: worker-1
    nic: ens192               # leaf 1
  sameLeaf:
    node: worker-2
    nic: ens192               # leaf 1  -> same leaf as server, no spine hop
  spine:
    node: worker-2
    nic: ens196               # leaf 2  -> crosses the spine

# -----------------------------------------------------------------------------
# DEFERRED (Phase 2, env 2.3 many-to-many): scaffold that stamps one idle
# toolbox pod per (node, rail). Off for now; the 1-to-1 flow above is the
# supported path. NAD naming: <nadPrefix>-<node>-rail<i> (i = 0..railsPerNode-1).
# -----------------------------------------------------------------------------
mesh:
  enabled: false
  nodes:
    - worker-1
    - worker-2
  railsPerNode: 8
  nadPrefix: roce-net
  device: mlx5_0
