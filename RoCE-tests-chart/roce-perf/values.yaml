# =============================================================================
# roce-perf values
# =============================================================================
# Full benchmark image: perftest (plain + CUDA/GPUDirect), nccl-tests + OpenMPI,
# python plotting stack. Build from ../Dockerfile.
image: docker.io/roi12345/it-ai-rdma-perf:v2
imagePullPolicy: IfNotPresent

# Pods run privileged so in-pod diagnostics (ping/traceroute, which need raw/ICMP
# sockets) work under any OpenShift SCC, alongside RDMA. IPC_LOCK is kept for the
# memory registration the RDMA stack needs (and for a non-privileged fallback).
privileged: true
ipcLock: true

# -----------------------------------------------------------------------------
# Port2Port RoCE topology.
#
# Each node exposes 8 RoCE rails (one NIC per GPU); each rail is its own SR-IOV
# device-plugin resource and its own Multus NAD (carrying that rail's exclusive
# IP + next hop). The first 4 rails land on leaf 1, the next 4 on leaf 2.
#
# A pod is therefore pinned by a (node, nic) pair, from which we DERIVE:
#   NAD name           = nadPattern      with {node}/{nic} substituted
#   device-plugin rsrc = resourcePattern with {nic}        substituted
# -----------------------------------------------------------------------------
topology:
  # Fallback NAD pattern, used only when a scenario endpoint omits its own `nad`.
  # ({node}/{nic} substituted; many fabrics need an explicit per-endpoint nad
  # because the NAD's node-token differs from the k8s hostname.)
  nadPattern: "roce-{node}-{nic}"                       # e.g. roce-h200-3-ens32
  resourcePattern: "openshift.io/rdma_resource_{nic}"   # e.g. openshift.io/rdma_resource_ens32
  device: mlx5_0                                        # in-pod RDMA device (one VF per pod); "auto" detects it

# Common fabric parameter shared by all perftest invocations.
mtu: 4096

# NUMA pinning. When enabled, each perftest run is wrapped in
# `numactl --cpunodebind=N --membind=N` for its rail's socket. With node=auto the
# runner reads the socket straight from the NIC's sysfs
# (/sys/class/infiniband/<dev>/device/numa_node) -- exact hardware truth, per pod.
# It pins only if those cores are actually bindable, otherwise it warns and runs
# unpinned -- for a real bind the pod must get cores on that socket: set
# resources.cpu/memory below (Guaranteed QoS) + kubelet topology manager
# single-numa-node.
numactl:
  enabled: true
  node: auto         # "auto" = detect from the NIC's numa_node; or a fixed node number

# Optional CPU/memory reservation. Setting BOTH makes the pod Guaranteed QoS, which
# (with the topology manager) is what lets NUMA pinning bind real cores. Empty =
# BestEffort/Burstable and numactl stays best-effort.
resources:
  cpu: ""            # e.g. "16"
  memory: ""         # e.g. "32Gi"

script:
  fileName: roce_bench.sh           # main runner, must exist under files/
  mountPath: /opt/roce

# Where each pod stores its run dirs. The 1-to-1 pods land on different nodes:
#   hostPath (default): a node-local directory that persists after the pod exits
#   pvcName           : a shared volume (an RWX PVC is the only backend all pods
#                       see at once); takes precedence over hostPath when set
#   neither set       : emptyDir (per-pod, deleted with the pod)
# run_suite.sh --report gathers each client's run dirs into the server pod before
# building the report, so hostPath/emptyDir work without a shared PVC. (The
# in-cluster report Job has no gather step and still needs a shared PVC.)
results:
  mountPath: /results
  hostPath: /var/lib/roce-perf      # node-local, persistent; set "" for emptyDir
  pvcName: ""                       # an RWX PVC shared by all pods (overrides hostPath)

# -----------------------------------------------------------------------------
# Phase-1 benchmark matrix. Each test is rendered into the pod environment and
# consumed by roce_bench.sh. Toggle tests with .enabled.
#   BW  tests run for a duration (-D) over a list of message sizes (-s).
#   LAT tests run a fixed iteration count (-n) and dump raw unsorted samples
#       (-U) so the report Job can build CDF/histogram and percentiles.
# -----------------------------------------------------------------------------
benchmarks:
  # Heavy defaults: each perftest pod drives ONE 100 Gb/s rail, so these are tuned
  # to SATURATE a single rail -- large messages (up to 8M), many QPs (16), and a
  # long -D so the run is a soak, not a blip. Expect ib_*_bw to approach ~95 Gb/s
  # per rail with --report_gbits. GPUDirect (1.6) re-runs this exact matrix over
  # --use_cuda, so it inherits the same heavy load.
  bw:
    read:                           # 1.1 Read-only BW  (ib_read_bw)
      enabled: true
      duration: 30                  # seconds (-D) -- long soak
      sizes: [65536, 1048576, 8388608]  # bytes (-s): 64K, 1M, 8M -> ramp to saturation
      qps: 16                       # number of QPs (-q) -- more parallelism -> line rate
    write:                          # 1.2 Write-only BW (ib_write_bw)
      enabled: true
      duration: 30
      sizes: [65536, 1048576, 8388608]
      qps: 16
  lat:
    write:                          # 1.3 Write-only Lat (ib_write_lat) + histogram
      enabled: true
      iters: 1000000                # -n : 1M ping-pongs -> dense histogram / over-time
      size: 2                       # bytes (-s) -- latency is measured at small size
      unsorted: true                # -U raw samples for graphing
    read:                           # 1.4 Read-only Lat (ib_read_lat) + histogram
      enabled: true
      iters: 1000000
      size: 2
      unsorted: true
    send:                           # 1.5 Send Lat (ib_send_lat) + histogram
      enabled: true
      iters: 1000000
      size: 2
      unsorted: true

# 1.6 GPUDirect: re-run the perftest matrix above with --use_cuda=<gpuIndex>.
# Requires the CUDA image and a GPU on the node (adds nvidia.com/gpu request).
gpudirect:
  enabled: false
  gpuIndex: 0                        # fallback GPU when a scenario endpoint omits gpuIndex
                                     # (real per-rail GPU is set in scenario.*.gpuIndex)
  # Tests to SKIP in the GPUDirect (--use_cuda) pass ONLY; they still run on the
  # NIC. ib_send_lat over CUDA memory is fragile on some driver/perftest combos,
  # so it's excluded by default. Set [] to attempt every test over GPUDirect.
  skip: [send_lat]

# 1.7 NCCL one-HCA-vs-all. Heaviest path; run manually via mpirun between the
# two 1-to-1 pods (see NOTES.txt). Default off.
nccl:
  enabled: false
  # Two pods (one per node) attached to a SUBSET of rails + GPUs. Cross-node
  # all_reduce exercises the rails (intra-node uses NVLink), and NCCL_IB_HCA is
  # restricted to one rail vs all to show rail aggregation. Drives via run_suite.sh
  # --nccl (SSH + mpirun). Size rails/gpus to what the cluster can spare.
  nodes:                            # exactly two: launcher, peer. host = k8s
    - host: ocp4-hypershift-nova-h200-03   # hostname (scheduling); nadNode = the
      nadNode: h200-3                       # NAD's node-token (NAD = nadPattern with
    - host: ocp4-hypershift-nova-h200-04    # {node}=nadNode, {nic}=rail)
      nadNode: h200-4
  rails:                            # rails to attach (each -> a NAD + a resource).
    - ens32                         # ALL 8 rails = full-node load. 4 on leaf 1
    - ens33                         # (ens32-35), 4 on leaf 2 (ens36-39). Trim this
    - ens34                         # list to run a lighter subset.
    - ens35
    - ens36
    - ens37
    - ens38
    - ens39
  gpus: 8                           # GPUs per NODE. The launch is one rank PER GPU
                                    # (-np = 2*gpus, -g 1), so 8 -> a 16-GPU all_reduce.
  collective: all_reduce_perf
  sizes:                            # Heavy/throughput sweep: start where busbw is
    begin: "128M"                   # -b  already saturated so the AVG reflects the
    end: "8G"                       # -e  fabric, not the small-message latency floor
    factor: "2"                     # -f  (8..128M averages ~10 GB/s; 128M..8G ~150+).
  hcaOne: auto                      # NCCL_IB_HCA "one rail"  (auto = first device)
  hcaAll: auto                      # NCCL_IB_HCA "all rails" (auto = all, comma-joined)
  # NCCL allocates host-side buffers in /dev/shm -- and Kubernetes gives pods a
  # 64Mi /dev/shm by default, which all_reduce_perf exhausts ("No space left on
  # device"). The chart mounts a memory-backed /dev/shm of shm.size in the NCCL
  # pods. shm.disable: "1" additionally sets NCCL_SHM_DISABLE=1 (skips the SHM
  # transport entirely) -- an escape hatch, not needed once /dev/shm is sized.
  shm:
    size: 16Gi
    disable: "0"
  # RoCE tuning passed to NCCL via `mpirun -x`. Without a valid GID index / socket
  # iface NCCL falls back to the CPU/socket transport. The tc/qps/pxn defaults are
  # the values that reached ~174 GB/s on this fabric -- see NCCL-DEEP-DIVE.md.
  ib:
    gidIndex: auto                  # NCCL_IB_GID_INDEX. auto = the IPv4-mapped RoCE v2
                                    # GID from sysfs (::ffff:<rail-ip>, typically 3) --
                                    # the ROUTABLE one (link-local fe80:: v2 GIDs are
                                    # not). Set a number (e.g. 3) to pin explicitly.
    socketIfname: eth0              # NCCL_SOCKET_IFNAME (OOB bootstrap iface)
    disable: "0"                    # NCCL_IB_DISABLE
    debug: WARN                     # NCCL_DEBUG (INFO shows the transport + GID chosen)
    tc: "106"                       # NCCL_IB_TC -- RoCE traffic class (DSCP = tc>>2 = 26);
                                    # MUST match the switch's lossless/PFC lane or BW
                                    # collapses. "" = NCCL default. Fabric-specific.
    qpsPerConnection: "16"          # NCCL_IB_QPS_PER_CONNECTION -- parallel QPs per peer
                                    # (spreads flows across the fabric; more BW). "" = 1.
    pxnDisable: "0"                 # NCCL_PXN_DISABLE -- 0 keeps PXN on (a GPU may reach
                                    # a remote peer via a NVLink-neighbour's rail -> better
                                    # rail utilisation). "1" disables it.

# In-cluster plotting/report Job: reads results PVC, emits PNGs + report.html
# under <results.mountPath>/report. Requires results.pvcName (RWX).
report:
  enabled: false
  outputSubdir: report

# -----------------------------------------------------------------------------
# 1-to-1 scenario. One server + two clients gives both environments at once.
# Leaf vs spine is purely WHICH NIC each endpoint uses:
#   same-leaf      (2.1): client on the SAME rail/leaf as the server (no spine)
#   spine-crossing (2.2): client on a rail that lands on a DIFFERENT leaf
# The chart stamps three pods (rdma-server, rdma-client-leaf, rdma-client-spine);
# the server autostarts its listeners, the clients idle until run_suite.sh drives
# them.
#
# Each endpoint sets:
#   node : k8s hostname for scheduling (kubernetes.io/hostname)
#   nic  : the rail -> device-plugin resource via topology.resourcePattern
#   nad  : the NetworkAttachmentDefinition name. The NAD's node-token usually
#          differs from the hostname (host ocp4-...-h200-03 -> NAD roce-h200-3-...),
#          so set it explicitly. Omit it to fall back to topology.nadPattern.
#   gpuIndex : (GPUDirect only) the GPU PAIRED WITH THIS nic. Each rail has its own
#          GPU on the same PCIe switch, so the spine rail needs a DIFFERENT GPU than
#          the leaf rails. Check the affinity with `nvidia-smi topo -m` (look for
#          PIX/PXB between the GPU and the mlx NIC). Omit to fall back to
#          gpudirect.gpuIndex.
# -----------------------------------------------------------------------------
scenario:
  server:
    node: ocp4-hypershift-nova-h200-03
    nic: ens32
    nad: roce-h200-3-ens32
    gpuIndex: 0                      # GPU on the ens32 rail (leaf 1)
  sameLeaf:                          # peer host on the SAME rail/leaf (no spine)
    node: ocp4-hypershift-nova-h200-04
    nic: ens32
    nad: roce-h200-4-ens32
    gpuIndex: 0                      # GPU on the ens32 rail (leaf 1)
  spine:                             # rail on a DIFFERENT leaf -> crosses the spine
    node: ocp4-hypershift-nova-h200-04
    nic: ens36
    nad: roce-h200-4-ens36
    gpuIndex: 4                      # GPU on the ens36 rail (leaf 2) -- different GPU
